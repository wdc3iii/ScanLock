/**:
  ros__parameters:
    scan_lock:
      pcd_file_name: "caltech_0.pcd"  # PCD filename (relative to scan_lock/pcd/)
      register_period_s: 5.0           # Local registration timer period (seconds)
      map_viz_voxel_size: 0.25         # Voxel size (m) for map visualization downsample
      scan_max_range: 20.0             # Max range (m) for scan distance filter
      local_map_radius: 30.0           # Radius (m) for map cropping around sensor
      submap_half_extent: 50.0         # Half-width (m) for submap extraction
      submap_rebuild_threshold: 20.0   # Distance (m) before submap is rebuilt
      correct_roll_pitch: true         # Use IMU roll/pitch for global registration initial guess
      registration_timing: false       # Print registration timing info

    frames:
      map_frame: "map"               # Map frame (parent of odom)
      odom_frame: "odom"             # Odom frame (published by spark_fast_lio)
      body_frame: "body"             # Body frame (child of imu via static TF)
      imu_frame: "imu"              # IMU frame (child of odom, scan source frame)

    topics:
      lidar_topic: "cloud_registered"  # Point cloud topic to subscribe to

    initial_guess:                   # Initial robot pose in map frame
      use_default: false             # true = use x/y/z/rpy below; false = wait for /initialpose
      x: 0.0
      y: 0.0
      z: 0.0                        # When use_default=false, this is body height above ground
      roll: 0.0                      # Default roll (radians), used in both modes
      pitch: 0.0                     # Default pitch (radians), used in both modes
      yaw: 0.0                       # Radians
      ground_search_radius_x: 5.0   # Half-width (m) for ground height search region
      ground_search_radius_y: 5.0   # Half-width (m) for ground height search region
      ground_percentile: 0.05       # Robust ground z (5th percentile of z values)
